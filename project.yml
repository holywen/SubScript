name: SubScript
options:
  bundleIdPrefix: com.subscript
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    COMBINE_HIDPI_IMAGES: YES
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
    INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 SubScript. All rights reserved."
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ENABLE_MODULES: YES
    SWIFT_EMIT_LOC_STRINGS: YES

packages:
  speech-swift:
    url: https://github.com/soniqo/speech-swift
    from: "0.0.12"

targets:
  SubScript:
    type: application
    platform: macOS
    sources:
      - path: Sources/SubScript/Models
      - path: Sources/SubScript/Pipeline
      - path: Sources/SubScript/State
      - path: Sources/SubScript/Store
      - path: Sources/SubScript/Services
      - path: Sources/SubScript/Views
      - path: Sources/SubScript/SubScriptApp.swift
      - path: Sources/SubScript/ContentView.swift
      - path: Sources/SubScript/Assets.xcassets
      - path: SubScript/Resources
      - path: Sources/SubScript/Resources/Binaries
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.subscript.app
        PRODUCT_NAME: SubScript
        INFOPLIST_KEY_CFBundleDisplayName: SubScript
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_ENTITLEMENTS: SubScript/Resources/SubScript.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSMinimumSystemVersion: "15.0"
        SWIFT_ARCHITECTURES: arm64
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: speech-swift
        product: Qwen3ASR
      - package: speech-swift
        product: SpeechVAD
      - package: speech-swift
        product: SpeechUI

schemes:
  SubScript:
    build:
      targets:
        SubScript: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release